<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF5FB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#D6EAF8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect width="300" height="200" rx="12" fill="#F0F4F8"/>

  <!-- Header dashboard -->
  <rect width="300" height="36" rx="12" fill="#0A2342"/>
  <rect x="0" y="24" width="300" height="12" fill="#0A2342"/>
  <circle cx="16" cy="18" r="5" fill="#2ECC71"/>
  <rect x="28" y="13" width="60" height="10" rx="3" fill="white" opacity="0.2"/>
  <rect x="220" y="13" width="30" height="10" rx="3" fill="white" opacity="0.15"/>
  <rect x="256" y="13" width="30" height="10" rx="3" fill="white" opacity="0.15"/>

  <!-- Cartes stats -->
  <!-- Carte 1 : Patients -->
  <rect x="8" y="44" width="64" height="44" rx="8" fill="white"/>
  <rect x="8" y="44" width="64" height="4" rx="4" fill="#2563EB"/>
  <rect x="14" y="55" width="30" height="5" rx="2" fill="#BDC3C7"/>
  <text x="14" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#0A2342">248</text>

  <!-- Carte 2 : Analyses -->
  <rect x="80" y="44" width="64" height="44" rx="8" fill="white"/>
  <rect x="80" y="44" width="64" height="4" rx="4" fill="#2ECC71"/>
  <rect x="86" y="55" width="30" height="5" rx="2" fill="#BDC3C7"/>
  <text x="86" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#0A2342">142</text>

  <!-- Carte 3 : Devis -->
  <rect x="152" y="44" width="64" height="44" rx="8" fill="white"/>
  <rect x="152" y="44" width="64" height="4" rx="4" fill="#7C3AED"/>
  <rect x="158" y="55" width="30" height="5" rx="2" fill="#BDC3C7"/>
  <text x="158" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#0A2342">37</text>

  <!-- Carte 4 : Finance -->
  <rect x="224" y="44" width="68" height="44" rx="8" fill="white"/>
  <rect x="224" y="44" width="68" height="4" rx="4" fill="#CA8A04"/>
  <rect x="230" y="55" width="30" height="5" rx="2" fill="#BDC3C7"/>
  <text x="230" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#0A2342">9.4k</text>

  <!-- Graphique barres -->
  <rect x="8" y="96" width="180" height="96" rx="8" fill="white"/>
  <rect x="16" y="103" width="80" height="6" rx="3" fill="#BDC3C7"/>
  <!-- Barres -->
  <rect x="20" y="148" width="16" height="32" rx="3" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="42" y="135" width="16" height="45" rx="3" fill="url(#barGrad)"/>
  <rect x="64" y="142" width="16" height="38" rx="3" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="86" y="128" width="16" height="52" rx="3" fill="url(#barGrad2)"/>
  <rect x="108" y="138" width="16" height="42" rx="3" fill="url(#barGrad2)" opacity="0.8"/>
  <rect x="130" y="125" width="16" height="55" rx="3" fill="url(#barGrad2)"/>
  <rect x="152" y="132" width="16" height="48" rx="3" fill="url(#barGrad)" opacity="0.9"/>
  <!-- Ligne base -->
  <line x1="14" y1="182" x2="178" y2="182" stroke="#ECF0F1" stroke-width="1"/>

  <!-- Liste récente -->
  <rect x="196" y="96" width="96" height="96" rx="8" fill="white"/>
  <rect x="204" y="103" width="60" height="6" rx="3" fill="#BDC3C7"/>
  <!-- Items liste -->
  <circle cx="208" cy="122" r="4" fill="#2ECC71"/>
  <rect x="216" y="119" width="50" height="5" rx="2" fill="#ECF0F1"/>
  <circle cx="208" cy="136" r="4" fill="#2563EB"/>
  <rect x="216" y="133" width="40" height="5" rx="2" fill="#ECF0F1"/>
  <circle cx="208" cy="150" r="4" fill="#7C3AED"/>
  <rect x="216" y="147" width="55" height="5" rx="2" fill="#ECF0F1"/>
  <circle cx="208" cy="164" r="4" fill="#CA8A04"/>
  <rect x="216" y="161" width="45" height="5" rx="2" fill="#ECF0F1"/>
  <circle cx="208" cy="178" r="4" fill="#E74C3C"/>
  <rect x="216" y="175" width="50" height="5" rx="2" fill="#ECF0F1"/>
</svg>
